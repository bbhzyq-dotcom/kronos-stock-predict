<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kronos 股票预测系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        a {
            padding: 0.75rem 1.5rem;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 0.5rem;
            transition: background 0.2s;
        }
        a:hover {
            background: #2563eb;
        }
        .status {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 0.5rem;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .status-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Kronos 股票预测系统</h1>
        <p>基于 Kronos Foundation Model 的智能股票预测平台</p>
        
        <div class="links">
            <a href="/static/index.html">打开前端界面</a>
            <a href="/api/health">API 健康检查</a>
            <a href="/api/stocks">获取股票列表</a>
        </div>
        
        <div class="status">
            <h3 style="margin-bottom: 1rem; color: #e2e8f0;">系统状态</h3>
            <div class="status-item">
                <span>后端服务</span>
                <span style="color: #22c55e;">运行中</span>
            </div>
            <div class="status-item">
                <span>数据源</span>
                <span style="color: #22c55e;">已连接</span>
            </div>
            <div class="status-item">
                <span>预测模型</span>
                <span style="color: #22c55e;">已加载</span>
            </div>
        </div>
    </div>
</body>
</html>
